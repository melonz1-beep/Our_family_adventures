name: Verify app

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check media-journal.js
          node --check media-page-fixes.js
          node --check scrapbook-studio-2.js
          node --check scrapbook-premium-10-3-15.js
          node --check scrapbook-premium-10-3-15-fixes.js
          node --check scrapbook-scenes-10-3-16.js
          node --check scrapbook-complete-10-3-17.js
          node --check version-10-3-17.js
          node --check service-worker.js
          node --check firebase-messaging-sw.js
          node --check Functions/index.js
      - name: Validate configuration files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('database.rules.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('firebase.json','utf8'))"
      - name: Run regression tests
        id: regression
        continue-on-error: true
        run: node --test tests/*.test.mjs > test-output.txt 2>&1
      - name: Upload regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-output
          path: test-output.txt
      - name: Enforce regression result
        if: steps.regression.outcome == 'failure'
        run: |
          cat test-output.txt
          exit 1
