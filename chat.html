<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Our Family Adventures Chat 10.0.5</title><meta name="theme-color" content="#dca49b"><style>
:root{--rose:#dca49b;--green:#6f8773;--bg:#111;--card:#211c1c;--text:#fff3ef}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}.head{position:sticky;top:0;z-index:4;padding:14px 16px;background:linear-gradient(90deg,#8b4e5b,#48624f);display:flex;justify-content:space-between;align-items:center}.head h1{font-size:1.2rem;margin:0}.head small{display:block;opacity:.9}.head button,.send button{border:1px solid #9db0a1;background:#181818;color:#fff;border-radius:18px;padding:10px 14px}.feed{padding:14px 12px 96px;display:flex;flex-direction:column;gap:10px}.msg{max-width:86%;padding:10px 12px;border-radius:18px;background:#302929;border:1px solid #596f5d;box-shadow:0 2px 8px #0005}.msg.mine{align-self:flex-end;background:#704b52}.msg b{display:block;color:#f0b2b4;font-size:.83rem}.msg p{margin:4px 0}.msg small{opacity:.7}.send{position:fixed;left:0;right:0;bottom:0;padding:10px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));display:flex;gap:8px;background:#171313ee;border-top:1px solid #536556}.send input{flex:1;min-width:0;border:1px solid #627866;border-radius:22px;background:#080808;color:#fff;padding:12px 14px;font-size:16px}.status{padding:8px 12px;color:#bfd0c1;font-size:.83rem}.empty{text-align:center;opacity:.7;margin-top:40px}
</style></head><body><div class="head"><div><h1>💬 Family Chat</h1><small>Our Family Adventures 10.0.5</small></div><button id="closeChat">Close</button></div><div id="status" class="status">Connecting…</div><main id="feed" class="feed"></main><div class="send"><input id="text" placeholder="Message the family" autocomplete="off"><button id="send">Send</button></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="./firebase-config.js?v=10.0.5"></script><script>
const FAMILY='main-family';document.getElementById('closeChat').onclick=()=>{try{window.close()}catch(_){}setTimeout(()=>{if(!window.closed){location.href='./index.html?v=10.0.5#home'}},250)};let uid=localStorage.getItem('ofa-uid')||'local-user';let data={chats:[]};const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function name(){try{let d=JSON.parse(localStorage.getItem('our-family-adventures-data')||'{}');let p=(d.people||[]).find(x=>x.owner===uid||x.email===localStorage.getItem('ofa-email'));return p?.name||((localStorage.getItem('ofa-role')||'')==='Admin'?'Melissa/Admin':'Family')}catch{return 'Family'}}
function render(){let f=document.getElementById('feed'),rows=(data.chats||[]).slice(0,100);f.innerHTML=rows.length?rows.map(c=>`<div class="msg ${c.user===uid?'mine':''}"><b>${esc(c.userName||'Family')}</b><p>${esc(c.text)}</p><small>${new Date(c.createdAt||Date.now()).toLocaleString()}</small></div>`).join(''):'<p class="empty">No messages yet.</p>';}
async function boot(){try{if(!firebase.apps.length)firebase.initializeApp(window.firebaseConfig);firebase.auth().onAuthStateChanged(u=>{if(u)uid=u.uid});let ref=firebase.database().ref(`families/${FAMILY}/appData`);ref.on('value',s=>{data=s.val()||{chats:[]};data.chats=Array.isArray(data.chats)?data.chats:[];document.getElementById('status').textContent='Connected and saving';render()});document.getElementById('send').onclick=async()=>{let i=document.getElementById('text'),text=i.value.trim();if(!text)return;let snap=await ref.once('value'),d=snap.val()||{};d.chats=Array.isArray(d.chats)?d.chats:[];d.chats.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2),text,user:uid,userName:name(),createdAt:Date.now(),tripId:''});d.notifications=Array.isArray(d.notifications)?d.notifications:[];await ref.set(d);i.value='';};document.getElementById('text').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('send').click()})}catch(e){document.getElementById('status').textContent='Could not connect. Open the main app and sign in first.';console.error(e)}}boot();
</script></body></html>
