<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Our Family Adventures Chat 10.1.5</title><meta name="theme-color" content="#dca49b"><style>
:root{--rose:#dca49b;--green:#6f8773;--bg:#f7f2ef;--card:#fff;--text:#2e2928;--mine:#f1d3d0;--other:#e9efe9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}.head{position:sticky;top:0;z-index:4;padding:14px 16px;background:linear-gradient(90deg,#d9a39a,#6f8773);color:#fff;display:flex;justify-content:space-between;align-items:center}.head h1{font-size:1.2rem;margin:0}.head small{display:block;opacity:.95}.head button,.send button{border:1px solid #6f8773;background:#fff;color:#304136;border-radius:18px;padding:10px 14px;font-weight:700}.feed{padding:14px 12px 100px;display:flex;flex-direction:column;gap:7px}.day{text-align:center;font-size:.78rem;color:#6f6a67;margin:10px 0}.msg{max-width:86%;padding:10px 12px;border-radius:18px;background:var(--other);border:1px solid #c7d2c8;box-shadow:0 2px 8px #0001}.msg.mine{align-self:flex-end;background:var(--mine);border-color:#ddb7b3}.msg b{display:block;color:#7b4d54;font-size:.83rem}.msg p{margin:4px 0;white-space:pre-wrap}.msg small{opacity:.7}.send{position:fixed;left:0;right:0;bottom:0;padding:10px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));display:flex;gap:8px;background:#fffefeee;border-top:1px solid #c8d1c9}.send input{flex:1;min-width:0;border:1px solid #8aa08e;border-radius:22px;background:#fff;color:#222;padding:12px 14px;font-size:16px}.status{padding:8px 12px;color:#506253;font-size:.83rem}.empty{text-align:center;opacity:.7;margin-top:40px}
body.dark{--bg:#090909;--card:#161313;--text:#f6eeee;--mine:#3a2828;--other:#172019}body.dark .head{background:linear-gradient(90deg,#7b3e48,#324d3b)}body.dark .head button,body.dark .send button{background:#211c1c;color:#ffeae6;border-color:#78917d}body.dark .send{background:#0d0b0bee;border-color:#403636}body.dark .send input{background:#090909;color:#fff0ec;border-color:#78917d}body.dark .msg{border-color:#536958;box-shadow:0 2px 8px #0008}body.dark .msg.mine{border-color:#9c666b}body.dark .msg b{color:#efb3b7}body.dark .status,body.dark .day{color:#b9cbb6}</style></head><body><div class="head"><div><h1>💬 Family Chat</h1><small>Our Family Adventures 10.1.5</small></div><button id="closeChat">Close</button></div><div id="status" class="status">Connecting…</div><main id="feed" class="feed"></main><div class="send"><input id="text" placeholder="Message the family" autocomplete="off"><button id="send">Send</button></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="./firebase-config.js?v=10.1.5"></script><script>
function syncTheme(){try{const d=JSON.parse(localStorage.getItem('ofa-9-data')||'{}');document.body.classList.toggle('dark',d?.settings?.theme==='dark')}catch(_){} }syncTheme();window.addEventListener('storage',syncTheme);window.addEventListener('focus',syncTheme);
const family=()=>{try{let d=JSON.parse(localStorage.getItem('ofa-9-data')||'{}');return d?.settings?.template?.familyId||'default-family'}catch{return 'default-family'}};let uid=localStorage.getItem('ofa-uid')||'local-user',rows=[];const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
document.getElementById('closeChat').onclick=()=>{try{window.close()}catch(_){}setTimeout(()=>{if(!window.closed)history.length>1?history.back():location.replace('./index.html?v=10.1.5#home')},200)};
function personName(){try{let d=JSON.parse(localStorage.getItem('ofa-9-data')||'{}'),email=localStorage.getItem('ofa-email');let p=(d.people||[]).find(x=>x.owner===uid||x.email===email);return p?.name||email||'Family'}catch{return 'Family'}}
function render(){let f=document.getElementById('feed'),sorted=[...rows].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)),lastDay='';f.innerHTML=sorted.length?sorted.map(c=>{let day=new Date(c.createdAt||Date.now()).toLocaleDateString(),head=day!==lastDay?`<div class="day">${day}</div>`:'';lastDay=day;return head+`<div class="msg ${c.user===uid?'mine':''}"><b>${esc(c.userName||'Family')}</b><p>${esc(c.text)}</p><small>${new Date(c.createdAt||Date.now()).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</small></div>`}).join(''):'<p class="empty">No messages yet.</p>';scrollTo(0,document.body.scrollHeight)}
async function boot(){try{if(!firebase.apps.length)firebase.initializeApp(window.firebaseConfig);await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);firebase.auth().onAuthStateChanged(u=>{if(u)uid=u.uid});const ref=firebase.database().ref(`families/${family()}/publicData/shared/chats`);ref.on('value',s=>{rows=Object.values(s.val()||{});document.getElementById('status').textContent='Connected and saving';render()});document.getElementById('send').onclick=async()=>{let i=document.getElementById('text'),text=i.value.trim();if(!text)return;let msg={id:Date.now().toString(36)+Math.random().toString(36).slice(2),text,user:uid,owner:uid,userName:personName(),createdAt:Date.now(),tripId:''};await ref.child(msg.id).set(msg);i.value=''};document.getElementById('text').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('send').click()})}catch(e){document.getElementById('status').textContent='Could not connect. Open the main app and sign in first.';console.error(e)}}boot();
</script></body></html>
